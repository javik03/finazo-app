services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ARTICLE_WEBHOOK_SECRET=${ARTICLE_WEBHOOK_SECRET}
      - ADMIN_SECRET=${ADMIN_SECRET}
      - PEXELS_API_KEY=${PEXELS_API_KEY}
      - INDEXNOW_KEY=${INDEXNOW_KEY}
      - NODE_ENV=production
      - SECURE_COOKIES=false  # set to true after Nginx + SSL is configured
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: finazo
      POSTGRES_USER: finazo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finazo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Remittance scraper — every 6 hours
  scraper-remittance:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
    command: sh -c "while true; do npx tsx src/agents/scraper/remittance-scraper.ts; sleep 21600; done"
    depends_on:
      postgres:
        condition: service_healthy

  # SSF loan rate scraper — daily
  scraper-ssf:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
    command: sh -c "while true; do npx tsx src/agents/scraper/ssf-loan-scraper.ts; sleep 86400; done"
    depends_on:
      postgres:
        condition: service_healthy

  # SIB Guatemala loan rate scraper — daily
  scraper-sib-gt:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
    command: sh -c "while true; do npx tsx src/agents/scraper/sib-gt-loan-scraper.ts; sleep 86400; done"
    depends_on:
      postgres:
        condition: service_healthy

  # CNBS Honduras loan rate scraper — daily
  scraper-cnbs-hn:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
    command: sh -c "while true; do npx tsx src/agents/scraper/cnbs-hn-loan-scraper.ts; sleep 86400; done"
    depends_on:
      postgres:
        condition: service_healthy

  # CMS ACA health insurance scraper — daily (US market)
  scraper-cms-aca:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
    command: sh -c "while true; do npx tsx src/agents/scraper/cms-aca-scraper.ts; sleep 86400; done"
    depends_on:
      postgres:
        condition: service_healthy

  # US loans scraper — weekly (APR tables change infrequently)
  scraper-us-loans:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
    command: sh -c "while true; do npx tsx src/agents/scraper/us-loans-scraper.ts; sleep 604800; done"
    depends_on:
      postgres:
        condition: service_healthy

  # Content strategist — daily (proactive: NerdWallet-style evergreen articles)
  writer-strategist:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PEXELS_API_KEY=${PEXELS_API_KEY}
    command: sh -c "while true; do npx tsx src/agents/writer/content-strategist.ts; sleep 86400; done"
    depends_on:
      postgres:
        condition: service_healthy

  # Monthly report generator — runs on 1st of each month at 02:00 UTC
  # Uses a simple loop: sleeps until next 1st-of-month, then generates report
  writer-monthly-report:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: >
      sh -c "
        while true; do
          NOW=\$(date +%d);
          if [ \"\$NOW\" = '01' ]; then
            npx tsx src/agents/writer/monthly-report-generator.ts;
            sleep 86400;
          else
            sleep 3600;
          fi
        done
      "
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
