services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ARTICLE_WEBHOOK_SECRET=${ARTICLE_WEBHOOK_SECRET}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: finazo
      POSTGRES_USER: finazo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finazo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Remittance scraper — every 6 hours
  scraper-remittance:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
    command: sh -c "while true; do npx tsx src/agents/scraper/remittance-scraper.ts; sleep 21600; done"
    depends_on:
      postgres:
        condition: service_healthy

  # SSF loan rate scraper — daily
  scraper-ssf:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
    command: sh -c "while true; do npx tsx src/agents/scraper/ssf-loan-scraper.ts; sleep 86400; done"
    depends_on:
      postgres:
        condition: service_healthy

  # SIB Guatemala loan rate scraper — daily
  scraper-sib-gt:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
    command: sh -c "while true; do npx tsx src/agents/scraper/sib-gt-loan-scraper.ts; sleep 86400; done"
    depends_on:
      postgres:
        condition: service_healthy

  # CNBS Honduras loan rate scraper — daily
  scraper-cnbs-hn:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
    command: sh -c "while true; do npx tsx src/agents/scraper/cnbs-hn-loan-scraper.ts; sleep 86400; done"
    depends_on:
      postgres:
        condition: service_healthy

  # Article generator — every hour (reactive: fires on rate change events)
  writer:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: sh -c "while true; do npx tsx src/agents/writer/article-generator.ts; sleep 3600; done"
    depends_on:
      postgres:
        condition: service_healthy

  # Content strategist — daily (proactive: NerdWallet-style evergreen articles)
  writer-strategist:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: sh -c "while true; do npx tsx src/agents/writer/content-strategist.ts; sleep 86400; done"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
