# Finazo reverse proxy configuration
# Deployed to: /etc/nginx/sites-available/finazo.conf

# Redirect HTTP to HTTPS (non-www canonical)
server {
    listen 80;
    listen [::]:80;
    server_name finazo.lat www.finazo.lat;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS canonical (non-www)
    location / {
        return 301 https://finazo.lat$request_uri;
    }
}

# Redirect www → non-www (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.finazo.lat;

    ssl_certificate /etc/letsencrypt/live/finazo.lat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/finazo.lat/privkey.pem;

    return 301 https://finazo.lat$request_uri;
}

# HTTPS server (canonical: finazo.lat)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name finazo.lat;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/finazo.lat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/finazo.lat/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression for assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/json application/javascript application/xml;
    gzip_disable "MSIE [1-6]\.";

    # Root location (reverse proxy to Next.js)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Static assets caching (long TTL)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Cache static assets for 1 year
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # API routes — no caching
    location ~ ^/api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # No cache for API
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }

    # Health check endpoint
    location /health {
        proxy_pass http://localhost:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Logging
    access_log /var/log/nginx/finazo_access.log combined;
    error_log /var/log/nginx/finazo_error.log warn;
}
